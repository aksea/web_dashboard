<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cursor Arm Dashboard</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="dashboard">
    <section class="cursor-panel" aria-label="cursor control">
      <div id="cursor-surface" class="cursor-surface">
        <div class="cursor-crosshair"></div>
        <div id="tap-marker" class="tap-marker"></div>
        <div id="cursor-target" class="cursor-target"></div>
      </div>
    </section>

    <section class="arm-panel" aria-label="arm control">
      <div id="arm-status" class="arm-status"><span id="arm-word">停</span><span class="arm-symbol"></span></div>
      <div class="height-stage" aria-label="height object">
        <div class="height-base"></div>
        <div id="height-column" class="height-column"></div>
      </div>
    </section>

    <section class="video-panel" aria-label="rtsp video">
      <div class="video-frame">
        <img id="video" alt="头盔视频画面" src="/video.mjpeg">
        <div class="video-empty" id="video-empty">
          <strong>等待视频画面</strong>
          <span id="video-url">等待 RTSP 地址</span>
        </div>
      </div>
    </section>
  </main>
  <script src="/app.js" type="module"></script>
</body>
</html>
